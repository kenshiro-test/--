<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢のしおり - Dream Schedule Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b0b1a;
            --bg-panel: #16162d;
            --accent: #6c5ce7;
            --text-main: #ffffff;
            --text-dim: #a0a0c0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        #error-display {
            display: none;
            background: #e74c3c;
            color: white;
            padding: 10px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 9999;
            text-align: center;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            visibility: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pattern-tabs {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }

        .pattern-btn {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            white-space: nowrap;
            cursor: pointer;
        }

        .pattern-btn.active {
            background: var(--accent);
            color: white;
        }

        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            margin-bottom: 5px;
        }

        .mode-switch {
            display: flex;
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 3px;
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 4px 10px;
            font-size: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: var(--glass);
            color: white;
        }

        .view-frame {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .grid-container {
            display: flex;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .ruler {
            width: 45px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--glass-border);
            position: relative;
            z-index: 60;
        }

        .hour-mark {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 9px;
            color: var(--text-dim);
            transform: translateY(-50%);
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
        }

        /* Select Mode Column */
        .lane {
            flex: 1;
            min-width: 100px;
            border-right: 1px dotted var(--glass-border);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .lane-label {
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 50;
            cursor: pointer;
        }

        .lane-label img {
            width: 35px;
            height: 35px;
            border-radius: 4px;
            object-fit: cover;
        }

        .show-name {
            font-size: 13px;
            font-weight: 700;
            margin: 5px 0;
            line-height: 1.2;
        }

        .show-info {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Refine Mode Column */
        .category-lane {
            flex: 1;
            min-width: 150px;
            border-right: 1px solid var(--glass-border);
            position: relative;
            background: rgba(255, 255, 255, 0.02);
        }

        .cat-header {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .items-container {
            flex-grow: 1;
            position: relative;
        }

        .item-box {
            position: absolute;
            left: 4px;
            right: 4px;
            border-radius: 6px;
            padding: 3px 6px;
            font-size: 9px;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 0.2s;
        }

        .item-box.unselected {
            background: transparent;
            border-style: dashed;
            opacity: 0.5;
        }

        .item-box.selected {
            color: white;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        /* Refine Mode Item (non-proportional option) */
        .refine-item {
            position: relative !important;
            top: 0 !important;
            margin: 5px 4px;
            height: auto !important;
            min-height: 36px;
            padding: 6px;
            border: 1px solid var(--glass-border);
            background: var(--bg-panel);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .refine-time {
            font-size: 8px;
            color: var(--accent);
            font-weight: 700;
        }

        .refine-name {
            font-size: 10px;
            margin-top: 2px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: var(--bg-panel);
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 3px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-fill {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-p {
            background: var(--accent);
            color: white;
        }

        .btn-s {
            background: var(--glass);
            color: white;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            margin-top: 10px;
            width: 100%;
        }

        .add-show-btn {
            background: var(--glass);
            border: 1px dashed var(--glass-border);
            color: var(--text-dim);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="error-display">⚠️ <span id="error-message"></span></div>

    <div class="app-container" id="app-main">
        <header>
            <h1>Dream Schedule Planner</h1>
            <div style="display:flex; gap:10px; align-items:center;">
                <button onclick="openMasterModal(-1)" class="add-show-btn">＋ ショー追加</button>
                <input type="date" id="plan-date"
                    style="background:var(--bg-panel); border:1px solid var(--glass-border); color:white; padding:4px 8px; border-radius:6px; font-size:12px;">
                <button id="btn-admin" title="管理者モード"
                    style="background:none; border:none; font-size:13px; font-weight:bold; color:var(--text-dim); cursor:pointer;">管理者モード</button>
                <button id="btn-config"
                    style="background:none; border:none; font-size:13px; font-weight:bold; color:var(--text-dim); cursor:pointer;">リセット</button>
            </div>
        </header>

        <main id="capture-area" style="flex-grow:1; display:flex; flex-direction:column; gap:5px; overflow:hidden;">
            <div id="pattern-list" class="pattern-tabs"></div>

            <div class="timeline-header">
                <div id="timeline-title" style="font-size:11px; font-weight:700;">スケジュール作成</div>
                <div class="mode-switch">
                    <button id="btn-mode-select" class="mode-btn active">ショー選択モード</button>
                    <button id="btn-mode-refine" class="mode-btn">予定整理モード</button>
                </div>
                <button id="btn-save-image"
                    style="background:none; border:none; color:var(--accent); font-size:10px; cursor:pointer;">📸
                    画像保存</button>
            </div>

            <div class="view-frame">
                <div class="grid-container">
                    <div class="ruler" id="ruler-win"></div>
                    <div class="content-area" id="content-win"></div>
                </div>
            </div>
        </main>

        <!-- Modals -->
        <div id="modal-item" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-item-title">予定の編集</h3>
                <div id="modal-item-inputs" style="margin:15px 0;"></div>
                <div class="modal-footer">
                    <button id="btn-item-save" class="btn-fill btn-p">保存</button>
                    <button onclick="closeModal('modal-item')" class="btn-fill btn-s">キャンセル</button>
                </div>
                <button id="btn-item-delete" class="btn-fill btn-danger">この予定を削除</button>
            </div>
        </div>

        <div id="modal-master" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-master-title">ショー情報の編集</h3>
                <div id="modal-master-inputs" style="margin:15px 0;">
                    <div class="input-group"><label>ショー名</label><input id="mst-name"></div>
                    <div class="input-group"><label>所要時間 (分)</label><input type="number" id="mst-dur"></div>
                    <div class="input-group"><label>抽選の有無</label><select id="mst-lottery">
                            <option value="0">なし</option>
                            <option value="1">あり</option>
                        </select></div>
                    <div class="input-group"><label>画像URL/ファイル名</label><input id="mst-img"></div>
                    <div class="input-group"><label>公演時間 (半角カンマ区切り)</label><input id="mst-times"
                            placeholder="13:00,15:30"></div>
                </div>
                <div class="modal-footer">
                    <button id="btn-master-save" class="btn-fill btn-p">保存</button>
                    <button onclick="closeModal('modal-master')" class="btn-fill btn-s">キャンセル</button>
                </div>
                <button id="btn-master-delete" class="btn-fill btn-danger">このショーを削除</button>
            </div>
        </div>

        <div id="modal-admin" class="modal hidden">
            <div class="modal-content" style="max-width:500px;">
                <h3>日別スケジュール管理</h3>
                <p id="admin-date-label" style="font-size:12px; color:var(--accent); margin:10px 0;"></p>
                <div id="admin-schedule-list"
                    style="max-height:300px; overflow-y:auto; margin:15px 0; border:1px solid var(--glass-border); border-radius:8px; padding:5px;">
                </div>
                <div class="modal-footer">
                    <button id="btn-admin-save" class="btn-fill btn-p">この日の時間を保存</button>
                    <button id="btn-admin-copy" class="btn-fill btn-s">他日程へコピー</button>
                </div>
                <button onclick="closeModal('modal-admin')" class="btn-fill btn-s"
                    style="width:100%; margin-top:10px;">閉じる</button>
            </div>
        </div>

        <div id="modal-copy" class="modal hidden">
            <div class="modal-content">
                <h3>日程コピー</h3>
                <p style="font-size:11px; color:var(--text-dim); margin:10px 0;">
                    現在のスケジュールをコピーする先の日付を選んでください（半角カンマ区切り、または改行）</p>
                <textarea id="copy-target-dates"
                    style="width:100%; height:100px; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:white; padding:10px; border-radius:8px; font-size:12px;"
                    placeholder="2026-05-06&#10;2026-05-07"></textarea>
                <div class="modal-footer">
                    <button id="btn-copy-exec" class="btn-fill btn-p">コピー実行</button>
                    <button onclick="closeModal('modal-copy')" class="btn-fill btn-s">キャンセル</button>
                </div>
            </div>
        </div>

        <div id="modal-config" class="modal hidden">
            <div class="modal-content">
                <h3>パターンのリセット</h3>
                <p style="font-size:12px; color:var(--text-dim); margin-top:10px;">
                    作成したすべてのパターンの予定をリセットします。<br>※管理者モードで設定したマスターデータは保持されます。</p>
                <button onclick="resetAllData()" class="btn-fill btn-danger">パターンを初期化</button>
                <button onclick="closeModal('modal-config')" class="btn-fill btn-s"
                    style="width:100%; margin-top:10px;">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        var DEFAULT_EVENTS = [
            { id: 1, name: "ハーモニー・イン・カラー", times: ["12:45"], isLottery: true, imageUrl: "ハーモニーインカラー.jpg", duration: 45 },
            { id: 2, name: "エレクトリカルパレード", times: ["18:15"], isLottery: false, imageUrl: "エレクトリカルパレード.jpg", duration: 45 },
            { id: 3, name: "リーチ・フォー・ザ・スターズ", times: ["17:50", "20:15"], isLottery: true, imageUrl: "リーチフォーザスターズ.jpg", duration: 20 },
            { id: 4, name: "ジャンボリミッキー！", times: ["10:45", "12:00", "13:45", "15:00"], isLottery: true, imageUrl: "ジャンボリミッキー.jpg", duration: 15 },
            { id: 5, name: "マジカルミュージックワールド", times: ["10:50", "12:15", "13:40", "15:45", "17:10"], isLottery: true, imageUrl: "マジカルミュージックワールド.jpg", duration: 25 },
            { id: 6, name: "クラブマウスビート", times: ["12:20", "13:45", "15:10", "17:15", "18:40"], isLottery: true, imageUrl: "クラブマウスビート.jpg", duration: 25 }
        ];

        var DataManager = function () {
            this.key = 'dream_v3';
            this.init();
        };
        DataManager.prototype.init = function () {
            var s = localStorage.getItem(this.key);
            if (!s) { this.reset(); } else {
                try {
                    var p = JSON.parse(s);
                    if (!p.masterEvents) this.reset();
                    if (!p.dailySchedules) { p.dailySchedules = {}; this.save(p); }
                } catch (e) { this.reset(); }
            }
        };
        DataManager.prototype.reset = function () {
            var d = { parkHours: { open: "09:00", close: "21:00" }, masterEvents: DEFAULT_EVENTS, plans: {}, dailySchedules: {} };
            this.save(d);
        };
        DataManager.prototype.get = function () { return JSON.parse(localStorage.getItem(this.key)); };
        DataManager.prototype.save = function (d) {
            localStorage.setItem(this.key, JSON.stringify(d));
            // サーバーへも非同期で保存
            fetch('/api/data', { method: 'POST', body: JSON.stringify(d) }).catch(function (e) { });
        };
        DataManager.prototype.syncWithServer = function (callback) {
            var self = this;
            fetch('/api/data').then(function (res) { return res.json(); }).then(function (d) {
                if (d && d.masterEvents) {
                    localStorage.setItem(self.key, JSON.stringify(d));
                }
                if (callback) callback();
            }).catch(function (e) {
                // オフラインまたはサーバーが起動していない場合はローカルのまま続行
                if (callback) callback();
            });
        };

        var dm = new DataManager();
        var state = { date: new Date().toISOString().split('T')[0], mode: 'select', pId: 0, px: 1, isAdmin: false };
        var COLORS = ['#6c5ce7', '#e84393', '#00cec9', '#fab1a0', '#00b894', '#0984e3', '#fdcb6e', '#fd79a8', '#55efc4', '#74b9ff'];

        function timeToMin(t) { var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]); }
        function minToTime(m) { var h = Math.floor(m / 60), n = m % 60; return (h < 10 ? '0' + h : h) + ':' + (n < 10 ? '0' + n : n); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function init() {
            dm.syncWithServer(function () {
                var urlParams = new URLSearchParams(window.location.search);
                state.isAdmin = urlParams.get('admin') === 'true';

                document.getElementById('app-main').style.visibility = 'visible';
                document.getElementById('plan-date').value = state.date;
                document.getElementById('plan-date').onchange = function (e) { state.date = e.target.value; render(); };
                document.getElementById('btn-mode-select').onclick = function () { state.mode = 'select'; render(); };
                document.getElementById('btn-mode-refine').onclick = function () { state.mode = 'refine'; render(); };
                document.getElementById('btn-config').onclick = function () { document.getElementById('modal-config').classList.remove('hidden'); };

                if (state.isAdmin) {
                    document.getElementById('btn-admin').onclick = function () {
                        var pass = prompt("管理者パスワードを入力してください");
                        if (pass === "1234") openAdminModal();
                        else if (pass !== null) alert("パスワードが違います");
                    };
                } else {
                    document.getElementById('btn-admin').style.display = 'none';
                    document.querySelector('.add-show-btn').style.display = 'none';
                }

                document.getElementById('btn-save-image').onclick = saveImage;
                render();
            });
        }

        function render() {
            var d = dm.get();
            var plans = d.plans[state.date] || [{ id: 0, name: "パターンA", items: [] }];
            var activePlan = plans[0];
            for (var i = 0; i < plans.length; i++) { if (plans[i].id === state.pId) activePlan = plans[i]; }

            // Mode UI
            document.getElementById('btn-mode-select').className = 'mode-btn' + (state.mode === 'select' ? ' active' : '');
            document.getElementById('btn-mode-refine').className = 'mode-btn' + (state.mode === 'refine' ? ' active' : '');

            // Tabs
            var tabs = document.getElementById('pattern-list'); tabs.innerHTML = '';
            plans.forEach(function (p) {
                var b = document.createElement('button'); b.className = 'pattern-btn' + (p.id === state.pId ? ' active' : '');
                b.innerText = p.name; b.onclick = function () { state.pId = p.id; render(); };
                tabs.appendChild(b);
            });
            var addP = document.createElement('button'); addP.className = 'pattern-btn'; addP.innerText = '＋追加';
            addP.onclick = function () {
                var n = prompt("名前"); if (n) { plans.push({ id: Date.now(), name: n, items: [] }); d.plans[state.date] = plans; dm.save(d); state.pId = plans[plans.length - 1].id; render(); }
            };
            tabs.appendChild(addP);

            // Ruler & Pixels (Used in Select Mode)
            var ruler = document.getElementById('ruler-win');
            var start = timeToMin(d.parkHours.open), end = timeToMin(d.parkHours.close);
            var headerH = 85;
            
            // スクロールなしで1画面にすべて収めるための高さ計算
            var frame = document.querySelector('.view-frame');
            var h = frame.clientHeight; 
            if (h < 300) h = 300; // 異常に小さい場合のみ最小値を保証
            state.px = (h - headerH) / (end - start);

            var win = document.getElementById('content-win');
            if (state.mode === 'select') {
                ruler.style.display = 'block';
                var rHtml = '<div style="height:' + headerH + 'px"></div>';
                var gridHtml = '';
                for (var m = start; m <= end; m += 60) {
                    var top = (m - start) * state.px + headerH;
                    rHtml += '<div class="hour-mark" style="top:' + top + 'px">' + Math.floor(m / 60) + ':00</div>';
                    gridHtml += '<div style="position:absolute; top:' + top + 'px; left:0; right:0; height:1px; background:rgba(255,255,255,0.05); z-index:1; pointer-events:none;"></div>';
                }
                ruler.innerHTML = rHtml;
                win.innerHTML = gridHtml;
                win.style.background = 'none';

                var totalH = (end - start) * state.px + headerH;
                win.style.height = totalH + 'px';
                ruler.style.height = totalH + 'px';

                var dailyTimes = d.dailySchedules[state.date] || {};
                d.masterEvents.forEach(function (m, idx) {
                    var times = dailyTimes[m.id] || m.times;
                    // 当日の公演時間が1つも設定されていない場合は表示しない
                    if (!times || times.length === 0) return;

                    var lane = document.createElement('div'); lane.className = 'lane';
                    lane.innerHTML = '<div class="lane-label" style="height:' + headerH + 'px; justify-content:center;">' +
                        '<div class="show-name" style="color:' + COLORS[idx % COLORS.length] + '">' + m.name + '</div>' +
                        '<div class="show-info">⏱️' + m.duration + '分' + (m.isLottery ? ' | 🎟️要抽選' : '') + '</div></div>' +
                        '<div class="items-container"></div>';
                    if (state.isAdmin) {
                        lane.querySelector('.lane-label').onclick = function () { openMasterModal(idx); };
                    } else {
                        lane.querySelector('.lane-label').style.cursor = 'default';
                    }

                    var area = lane.querySelector('.items-container');
                    times.forEach(function (t) {
                        var isSel = activePlan.items.some(function (it) { return it.masterId === m.id && it.time === t; });
                        renderItemBox(area, m, t, isSel, start, idx, false, activePlan.id);
                    });
                    win.appendChild(lane);
                });
            } else {
                // Refine Mode: Synchronized Multi-column Grid
                ruler.style.display = 'block';
                win.innerHTML = '';
                win.style.background = 'none';

                // 1. Collect all time boundaries from all patterns
                var timePoints = [start, end];
                plans.forEach(function (p) {
                    p.items.forEach(function (it) {
                        var s = timeToMin(it.time);
                        var e = s + (it.duration || 30);
                        if (!timePoints.includes(s)) timePoints.push(s);
                        if (!timePoints.includes(e)) timePoints.push(e);
                    });
                });
                timePoints.sort(function (a, b) { return a - b; });

                // 2. Render Ruler
                var rHtml = '<div style="height:' + headerH + 'px"></div>';
                timePoints.forEach(function (tp, idx) {
                    // We don't use absolute positioning here anymore, we'll sync with flex rows
                    // But we'll create a side-ruler column in the grid instead for better sync
                });
                ruler.innerHTML = ''; // We'll render ruler inside the win for perfect sync

                // 3. Create Grid Structure
                var grid = document.createElement('div');
                grid.style.cssText = 'display:flex; flex-direction:column; min-width:100%;';

                // Header Row
                var hRow = document.createElement('div');
                hRow.style.cssText = 'display:flex; position:sticky; top:0; z-index:100; background:var(--bg-dark);';
                hRow.innerHTML = '<div style="width:50px; flex-shrink:0; background:var(--glass); border-bottom:1px solid var(--glass-border);"></div>'; // Corner
                plans.forEach(function (p, pIdx) {
                    var h = document.createElement('div');
                    h.className = 'category-lane';
                    h.style.cssText = 'flex:1; min-width:240px; border-right:1px solid var(--glass-border); position:relative;';
                    h.innerHTML = '<div class="cat-header" style="height:' + headerH + 'px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; border-bottom:1px solid var(--glass-border);">' +
                        '<div style="display:flex; align-items:center; gap:8px;">' +
                        '<div style="font-size:14px; color:var(--accent); font-weight:bold;">' + p.name + '</div>' +
                        (plans.length > 1 ? '<button class="del-plan-btn" style="background:none; border:none; cursor:pointer; font-size:12px; opacity:0.5;">🗑️</button>' : '') +
                        '</div>' +
                        '<button class="add-plan-btn" style="background:var(--accent); color:white; border:none; padding:4px 12px; border-radius:15px; font-size:10px; cursor:pointer;">＋ 予定追加</button></div>';

                    h.querySelector('.add-plan-btn').onclick = function () { openItemModal(-1, 'other', '', p.id); };
                    var delBtn = h.querySelector('.del-plan-btn');
                    if (delBtn) {
                        delBtn.onclick = function () {
                            if (confirm(p.name + "を削除しますか？")) {
                                plans.splice(pIdx, 1);
                                d.plans[state.date] = plans;
                                dm.save(d);
                                if (state.pId === p.id) state.pId = plans[0].id;
                                render();
                            }
                        };
                    }
                    hRow.appendChild(h);
                });
                grid.appendChild(hRow);

                // 4. Calculate Segment Heights
                var segmentHeights = [];
                for (var i = 0; i < timePoints.length - 1; i++) {
                    var sTime = timePoints[i];
                    var eTime = timePoints[i + 1];
                    var dur = eTime - sTime;
                    var anyEventStarts = plans.some(function (p) { return p.items.some(function (it) { return timeToMin(it.time) === sTime; }); });
                    segmentHeights[i] = anyEventStarts ? 80 : Math.max(dur * 0.5, 30);
                }

                // Create the Flex-Row container for Columns
                var columnsContainer = document.createElement('div');
                columnsContainer.style.cssText = 'display:flex; flex-direction:row; width:100%;';

                // Ruler Column
                var rulerCol = document.createElement('div');
                rulerCol.style.cssText = 'width:50px; flex-shrink:0; border-right:1px solid var(--glass-border); background:rgba(0,0,0,0.2); display:flex; flex-direction:column;';
                for (var i = 0; i < timePoints.length - 1; i++) {
                    var rCell = document.createElement('div');
                    rCell.style.cssText = 'height:' + segmentHeights[i] + 'px; border-bottom:1px dashed rgba(255,255,255,0.05); font-size:10px; color:var(--text-dim); padding-top:4px; font-weight:bold; text-align:center; box-sizing:border-box;';
                    rCell.innerText = minToTime(timePoints[i]);
                    rulerCol.appendChild(rCell);
                }
                var rLastCell = document.createElement('div');
                rLastCell.style.cssText = 'height:30px; font-size:10px; color:var(--text-dim); padding-top:4px; font-weight:bold; text-align:center; box-sizing:border-box;';
                rLastCell.innerText = minToTime(timePoints[timePoints.length - 1]);
                rulerCol.appendChild(rLastCell);
                columnsContainer.appendChild(rulerCol);

                // Pattern Columns
                plans.forEach(function (p) {
                    var col = document.createElement('div');
                    col.style.cssText = 'flex:1; min-width:240px; border-right:1px solid var(--glass-border); display:flex; flex-direction:column;';

                    var i = 0;
                    while (i < timePoints.length - 1) {
                        var sTime = timePoints[i];
                        var item = p.items.find(function (it) { return timeToMin(it.time) === sTime; });

                        if (item) {
                            var itemDur = item.duration || 30;
                            var endT = sTime + itemDur;
                            var h = 0;
                            var span = 0;
                            while (i + span < timePoints.length - 1 && timePoints[i + span] < endT) {
                                h += segmentHeights[i + span];
                                span++;
                            }
                            if (span === 0) span = 1;

                            var cell = document.createElement('div');
                            cell.style.cssText = 'height:' + h + 'px; border-bottom:1px dashed rgba(255,255,255,0.05); padding:6px; box-sizing:border-box; position:relative;';

                            var mIdx = -1;
                            if (item.masterId !== 999 && item.masterId !== 888) {
                                mIdx = d.masterEvents.findIndex(function (m) { return m.id === item.masterId; });
                            }
                            renderItemBoxFlow(cell, item, item.time, start, (mIdx >= 0 ? mIdx : 99), p.id);
                            col.appendChild(cell);
                            i += span;
                        } else {
                            var isInside = p.items.some(function (it) {
                                var s = timeToMin(it.time);
                                var e = s + (it.duration || 30);
                                return sTime >= s && sTime < e;
                            });

                            if (!isInside) {
                                var nextItem = p.items.filter(function (it) { return timeToMin(it.time) > sTime; })
                                    .sort(function (a, b) { return timeToMin(a.time) - timeToMin(b.time); })[0];
                                var gapEnd = nextItem ? timeToMin(nextItem.time) : end;
                                var gapDur = gapEnd - sTime;

                                if (gapDur > 0) {
                                    var h = 0;
                                    var span = 0;
                                    while (i + span < timePoints.length - 1 && timePoints[i + span] < gapEnd) {
                                        h += segmentHeights[i + span];
                                        span++;
                                    }
                                    if (span === 0) span = 1;
                                    var cell = document.createElement('div');
                                    cell.style.cssText = 'height:' + h + 'px; border-bottom:1px dashed rgba(255,255,255,0.05); box-sizing:border-box; position:relative;';
                                    renderGapInfoFlowFixed(cell, gapDur);
                                    col.appendChild(cell);
                                    i += span;
                                } else {
                                    var cell = document.createElement('div');
                                    cell.style.cssText = 'height:' + segmentHeights[i] + 'px; border-bottom:1px dashed rgba(255,255,255,0.05); box-sizing:border-box;';
                                    col.appendChild(cell);
                                    i++;
                                }
                            } else {
                                var cell = document.createElement('div');
                                cell.style.cssText = 'height:' + segmentHeights[i] + 'px; border-bottom:1px dashed rgba(255,255,255,0.05); box-sizing:border-box;';
                                col.appendChild(cell);
                                i++;
                            }
                        }
                    }
                    columnsContainer.appendChild(col);
                });

                grid.appendChild(columnsContainer);
                win.appendChild(grid);
                ruler.style.display = 'none'; // We integrated it into the grid
                
                var totalH = headerH + 30;
                for(var i=0; i<segmentHeights.length; i++) totalH += segmentHeights[i];
                win.style.height = totalH + 'px';
            }
        }

        function renderItemBoxFlow(area, it, t, startMin, mIdx, pId) {
            var dur = it.duration || 30;
            var div = document.createElement('div');
            div.style.cssText = 'padding:12px; border-radius:12px; background:' + (COLORS[mIdx % COLORS.length] || '#999') + '; color:white; cursor:pointer; position:relative; box-shadow:0 6px 15px rgba(0,0,0,0.4); z-index:10;';

                '<div style="font-size:10px; opacity:0.8; font-weight:bold;">⏱️' + dur + '分</div>' +

        function renderItemBox(area, it, t, isSel, start, mIdx, isRefine, pId) {
            var mStart = timeToMin(t), dur = it.duration || 30;
            var div = document.createElement('div');
            div.className = 'item-box ' + (isSel ? 'selected' : 'unselected');

            div.style.top = (mStart - start) * state.px + 'px';
            // 常に60分相当の枠のサイズにして見やすくする
            var h = 60 * state.px;
            div.style.height = h + 'px';

            var color = COLORS[mIdx % COLORS.length] || '#999';
            if (isSel) div.style.backgroundColor = color;
            else { div.style.borderColor = color; div.style.color = color; }

            // 文字サイズも大きく見やすくする
            div.innerHTML = '<span style="font-size:11px; font-weight:bold;">' + t + ' ~ ' + minToTime(mStart + dur) + '</span>';

        function toggleSelection(m, t, pId) {
            var d = dm.get(); var plans = d.plans[state.date] || [{ id: 0, name: "パターンA", items: [] }];
            var p = plans.find(function (it) { return it.id === pId; });
            var idx = p.items.findIndex(function (it) { return it.masterId === m.id && it.time === t; });
            if (idx === -1) {
                var start1 = timeToMin(t);
                var end1 = start1 + m.duration;
                var overlap = p.items.find(function (it) {
                    var s2 = timeToMin(it.time);
                    var e2 = s2 + (it.duration || 30);
                    return (start1 < e2 && end1 > s2);
                });
                if (overlap) {
                    alert("他の予定（" + overlap.name + "）と時間が重複しているため追加できません。");
                    return;
                }
                p.items.push({ masterId: m.id, name: m.name, time: t, duration: m.duration });
            } else {
                p.items.splice(idx, 1);
            }
            d.plans[state.date] = plans; dm.save(d); render();
        }

        function openItemModal(idx, cat, initialTime, pId) {
            var d = dm.get(); var plans = d.plans[state.date];
            var targetPId = pId !== undefined ? pId : state.pId;
            var p = plans.find(function (it) { return it.id === targetPId; });
            var it = idx === -1 ? { name: '', time: initialTime || '', duration: 30, cat: cat || 'other' } : p.items[idx];

            var html = '<div class="input-group"><label>名称</label><input id="it-name" value="' + it.name + '"></div>' +
                '<div class="input-group"><label>開始時間</label><input type="time" id="it-time" value="' + it.time + '"></div>' +
                '<div class="input-group"><label>所要時間(分)</label><input type="number" id="it-dur" value="' + it.duration + '"></div>' +
                '<div class="input-group"><label>カテゴリ</label><select id="it-cat">' +
                '<option value="show" ' + (it.cat === 'show' ? 'selected' : '') + '>ショー・パレード</option>' +
                '<option value="attraction" ' + (it.cat === 'attraction' ? 'selected' : '') + '>アトラクション</option>' +
                '<option value="food" ' + (it.cat === 'food' ? 'selected' : '') + '>食事・休憩</option>' +
                '<option value="other" ' + (it.cat === 'other' ? 'selected' : '') + '>その他</option></select></div>';
            document.getElementById('modal-item-inputs').innerHTML = html;
            document.getElementById('modal-item-title').innerText = idx === -1 ? '予定の追加 (' + p.name + ')' : '予定の編集 (' + p.name + ')';
            document.getElementById('btn-item-delete').style.display = idx === -1 ? 'none' : 'block';
            document.getElementById('modal-item').classList.remove('hidden');

            document.getElementById('btn-item-save').onclick = function () {
                it.name = document.getElementById('it-name').value; it.time = document.getElementById('it-time').value;
                it.duration = parseInt(document.getElementById('it-dur').value); it.cat = document.getElementById('it-cat').value;
                if (!it.name || !it.time) return;

                var start1 = timeToMin(it.time);
                var end1 = start1 + it.duration;
                var overlap = p.items.find(function (other, oIdx) {
                    if (idx !== -1 && p.items[idx] === other) return false;
                    var s2 = timeToMin(other.time);
                    var e2 = s2 + (other.duration || 30);
                    return (start1 < e2 && end1 > s2);
                });

                if (overlap) {
                    alert("他の予定（" + overlap.name + "）と時間が重複しています。");
                    return;
                }

                if (it.cat === 'show') {
                    if (it.masterId === undefined) it.masterId = 888;
                } else {
                    it.masterId = 999;
                }
                if (idx === -1) p.items.push(it);
                p.items.sort(function (a, b) { return a.time.localeCompare(b.time); });
                dm.save(d); closeModal('modal-item'); render();
            };
            document.getElementById('btn-item-delete').onclick = function () { p.items.splice(idx, 1); dm.save(d); closeModal('modal-item'); render(); };
        }

        function openAdminModal() {
            var d = dm.get();
            var dailyTimes = d.dailySchedules[state.date] || {};
            document.getElementById('admin-date-label').innerText = "対象日: " + state.date;
            var list = document.getElementById('admin-schedule-list'); list.innerHTML = '';

            d.masterEvents.forEach(function (m) {
                var row = document.createElement('div');
                row.style.cssText = 'padding:10px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;';
                var times = dailyTimes[m.id] || m.times;
                row.innerHTML = '<div style="font-size:11px; flex:1;">' + m.name + '</div>' +
                    '<input class="admin-times-input" data-id="' + m.id + '" style="flex:2; font-size:11px; padding:4px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white; border-radius:4px;" value="' + times.join(',') + '">';
                list.appendChild(row);
            });

            document.getElementById('modal-admin').classList.remove('hidden');

            document.getElementById('btn-admin-save').onclick = function () {
                var newDaily = {};
                document.querySelectorAll('.admin-times-input').forEach(function (input) {
                    var id = input.getAttribute('data-id');
                    var val = input.value.split(',').map(function (s) { return s.trim(); }).filter(function (s) { return s; });
                    newDaily[id] = val;
                });
                d.dailySchedules[state.date] = newDaily;
                dm.save(d);
                alert("保存しました");
                render();
            };

            document.getElementById('btn-admin-copy').onclick = function () {
                document.getElementById('modal-copy').classList.remove('hidden');
            };

            document.getElementById('btn-copy-exec').onclick = function () {
                var targetStr = document.getElementById('copy-target-dates').value;
                var parts = targetStr.split(/[,\n]/).map(function (s) { return s.trim(); }).filter(function (s) { return s; });
                var targets = [];

                parts.forEach(function (p) {
                    if (p.indexOf('~') !== -1) {
                        var range = p.split('~').map(function (s) { return s.trim(); });
                        if (range.length === 2) {
                            var curr = new Date(range[0]);
                            var end = new Date(range[1]);
                            if (!isNaN(curr) && !isNaN(end)) {
                                while (curr <= end) {
                                    var y = curr.getFullYear();
                                    var m = ("0" + (curr.getMonth() + 1)).slice(-2);
                                    var d = ("0" + curr.getDate()).slice(-2);
                                    targets.push(y + '-' + m + '-' + d);
                                    curr.setDate(curr.getDate() + 1);
                                }
                            }
                        }
                    } else {
                        targets.push(p);
                    }
                });

                if (targets.length === 0) return;

                var currentSchedule = d.dailySchedules[state.date];
                if (!currentSchedule) {
                    currentSchedule = {};
                    d.masterEvents.forEach(function (m) { currentSchedule[m.id] = m.times; });
                }

                targets.forEach(function (date) {
                    d.dailySchedules[date] = JSON.parse(JSON.stringify(currentSchedule));
                });
                dm.save(d);
                alert(targets.length + "件の日程にコピーしました");
                closeModal('modal-copy');
            };
        }

                var d = dm.get();
                d.plans = {};
                dm.save(d);
                location.reload();
            }
        }
        function saveImage() {
            var area = document.getElementById('capture-area');
            html2canvas(area, { backgroundColor: "#0b0b1a", scale: 2 }).then(function (canvas) {
                var link = document.createElement('a'); link.download = 'dream_plan.png'; link.href = canvas.toDataURL(); link.click();
            });
        }

        var check = setInterval(function () { if (document.getElementById('plan-date')) { clearInterval(check); init(); } }, 100);
    </script>
</body>

</html>
